name: termos_ui
description: Maximalist Flutter UI widgets with dot-grid mesh, starfield particles, CRT scanlines, and themed controls.
version: 0.1.0
repository: https://github.com/Pomis/terminaster/tree/main/packages/termos_ui
issue_tracker: https://github.com/Pomis/terminaster/issues

topics:
  - ui
  - widgets
  - theme
  - animations

screenshots:
  - description: Button with dot-grid mesh and starfield particles.
    path: example/doc/gallery/button.gif
  - description: CRT wrapper with scanlines, vignette, and bezel.
    path: example/doc/gallery/crt.gif
  - description: Bottom navigation bar with animated top-edge glow.
    path: example/doc/gallery/nav_bar.gif
  - description: Segmented selector with glow and starfield.
    path: example/doc/gallery/segmented.gif
  - description: Slider variants with floating labels and snap.
    path: example/doc/gallery/sliders.gif

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: '>=3.32.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
